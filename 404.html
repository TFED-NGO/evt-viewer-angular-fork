<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>EVT Viewer</title>
    <script type="text/javascript">
      // GitHub Pages SPA fallback: keep repo base path (e.g. /evt-viewer-angular-fork/)
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').split('?')[0] +
        (l.search ? '&' + l.search.slice(1) : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
