<ng-container *ngIf="(entries$ | async) as entries">
        <ng-container *ngIf="entries.length">
                <ng-container *ngFor="let entry of entries">
                        <div #appDetails style="scroll-margin-top: 100px;" (click)="selectApparatusEntry(entry.entry)">
                                <evt-apparatus-entry-detail [data]="entry.entry" class="app-list" [editionLevel]="editionLevel"
                                [isSelected]="entry.isSelected"></evt-apparatus-entry-detail>
                        </div>
                </ng-container>
        </ng-container>
</ng-container>
