<span class="subst">
    <!-- deletions first --> 
     <ng-container *ngIf="data.del">
        <evt-content-viewer
            [content]="data.del" [editionLevel]="editionLevel" 
            [itemsToHighlight]="itemsToHighlight" [evtHighlight]="highlightData" [textFlow]="textFlow"
            [withDeletions]="true" [selectedLayer]="selectedLayer">
        </evt-content-viewer>
     </ng-container>
     <ng-container *ngIf="data.add">
        <evt-content-viewer
            [content]="data.add" [editionLevel]="editionLevel" 
            [itemsToHighlight]="itemsToHighlight" [evtHighlight]="highlightData" [textFlow]="textFlow"
            [withDeletions]="withDeletions" [selectedLayer]="selectedLayer">
        </evt-content-viewer>
     </ng-container>
